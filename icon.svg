<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6A38"/>
      <stop offset="100%" stop-color="#CC3A00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!--
    Arc: clockwise from 300° (1 o'clock, start/tail) to ~228° (shortened so
    the rounded cap butts into the arrowhead base seamlessly).
    Center (256,256), radius 148. Gap is the 60° window from 240°–300° at top.
    300° → 228° clockwise = 288° arc → large-arc=1, sweep=1.

    Start at 300°: (256+148*cos300, 256+148*sin300) = (330, 128)
    End   at 228°: (256+148*cos228, 256+148*sin228) = (157, 146)
  -->
  <path d="M 330 128 A 148 148 0 1 1 157 146"
        fill="none"
        stroke="white"
        stroke-width="52"
        stroke-linecap="round"/>

  <!--
    Arrowhead at the 240° position (11 o'clock), oriented along the
    clockwise tangent at 240°: direction = (-sin240, cos240) = (0.866, -0.5).
    Perpendicular = (0.5, 0.866).

    Arc end at 240°: (182, 128).
    Tip   = end + 44*(0.866, -0.5)       = (220, 106)
    Base  = end - 12*(0.866, -0.5)       = (172, 134)
    Left  = base + 40*(0.5,  0.866)      = (192, 169)
    Right = base - 40*(0.5,  0.866)      = (152,  99)
  -->
  <polygon points="220,106 192,169 152,99" fill="white"/>
</svg>
