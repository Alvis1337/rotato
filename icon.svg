<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6750A4"/>
      <stop offset="100%" style="stop-color:#4A90D9"/>
    </linearGradient>
    <clipPath id="roundedSquare">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Photo frame -->
  <rect x="136" y="156" width="240" height="200" rx="18" ry="18" fill="white" opacity="0.95"/>

  <!-- Sky in photo -->
  <rect x="136" y="156" width="240" height="120" rx="18" ry="18" fill="#AED6F1"/>
  <rect x="136" y="236" width="240" height="40" fill="#AED6F1"/>

  <!-- Sun -->
  <circle cx="310" cy="195" r="22" fill="#F9E04B"/>

  <!-- Mountains -->
  <polygon points="136,276 196,196 256,276" fill="#5D8A5E"/>
  <polygon points="196,276 266,206 336,276" fill="#4A7A4B"/>
  <polygon points="256,276 316,216 376,276" fill="#5D8A5E"/>

  <!-- Ground -->
  <rect x="136" y="276" width="240" height="80" fill="#7DBE7E" rx="0"/>
  <rect x="136" y="316" width="240" height="40" fill="#7DBE7E" rx="0"/>
  <!-- bottom corners of photo -->
  <rect x="136" y="316" width="240" height="40" fill="#6AAD6B"/>

  <!-- Rotation arrow - top arc (clockwise, top-right) -->
  <path d="M 256 108
             A 148 148 0 0 1 371 181"
        fill="none" stroke="white" stroke-width="28" stroke-linecap="round"/>
  <!-- Arrow head top-right -->
  <polygon points="385,163 359,197 343,166" fill="white"/>

  <!-- Rotation arrow - bottom arc (clockwise, bottom-left) -->
  <path d="M 256 404
             A 148 148 0 0 1 141 331"
        fill="none" stroke="white" stroke-width="28" stroke-linecap="round"/>
  <!-- Arrow head bottom-left -->
  <polygon points="127,349 153,315 169,346" fill="white"/>
</svg>
